name: Bump

on:
  workflow_dispatch:
  schedule:
    - cron:  '0 6 * * *'

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Install Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name:
        run: pip install ruamel.yaml requests
      - name: generate jsonschema
        run: ./generate_jsonschema.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v4
        with:
          title: 'build(deps): bump ${{ steps.bump.outputs.component }} to ${{ steps.bump.outputs.version }}'
          commit-message: 'build(deps): bump ${{ steps.bump.outputs.component }} to ${{ steps.bump.outputs.version }}'
          branch: 'bump-${{ steps.bump.outputs.component }}'
          delete-branch: true
          body: '${{ steps.bump.outputs.release_link }}'
